services:
  backend:
    image: my-node-app

    build:
      context: .
      dockerfile: Dockerfile

    container_name: backend

    ports:
      - '127.0.0.1:3000:3000'

    mem_limit: 512m

    depends_on:
      redis:
        condition: service_healthy

    env_file:
      - .env

    environment:
      NODE_ENV: production
      NODE_OPTIONS: '--max-old-space-size=400'
      REDIS_HOST: redis
      REDIS_PORT: 6379

    restart: always

    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    image: my-node-app

    container_name: worker

    command: npm run worker

    mem_limit: 512m

    depends_on:
      redis:
        condition: service_healthy

    env_file:
      - .env

    environment:
      NODE_ENV: production
      NODE_OPTIONS: '--max-old-space-size=400'
      REDIS_HOST: redis
      REDIS_PORT: 6379

    restart: always

  redis:
    image: redis:7-alpine

    container_name: redis

    mem_limit: 512m

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction

    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

    restart: always

volumes:
  redis_data:
